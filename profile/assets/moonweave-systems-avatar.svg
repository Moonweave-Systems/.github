<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Moonweave Systems avatar</title>
  <desc id="desc">A crescent moon and woven system paths on a dark circular field.</desc>
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="78%">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="0.55" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#05070f"/>
    </radialGradient>
    <linearGradient id="systemLine" x1="232" y1="790" x2="802" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#2f81f7"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="356" fill="none" stroke="#1f6feb" stroke-width="18" opacity="0.22"/>
