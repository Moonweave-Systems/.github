  <path d="M246 679c122-2 189-76 280-151 88-72 161-120 277-108" fill="none" stroke="url(#systemLine)" stroke-width="32" stroke-linecap="round"/>
  <path d="M246 760c122-2 189-76 280-151 88-72 161-120 277-108" fill="none" stroke="url(#systemLine)" stroke-width="20" stroke-linecap="round" opacity="0.88"/>
